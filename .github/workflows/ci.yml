name: ci

on:
    push:
        branches:
            - main
    pull_request:

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: '1.22.x'
                  cache-dependency-path: go.sum

            - name: Test
              run: go test -mod=readonly ./...

            - name: Vet
              run: go vet ./...
